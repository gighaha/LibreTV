name = "libretv"
compatibility_date = "2024-12-01"
pages_build_output_dir = "."
pages_build_command = "date -u '+%Y/%m/%d %H:%M:%S UTC' > BUILD_TIME"

# D1 数据库绑定
# database_id 在创建 D1 后从 Cloudflare Dashboard 获取
[[d1_databases]]
binding = "DB"
database_name = "libretv-history"
database_id = "e0a3b879-042c-49ba-aabb-d95c561a2713"

